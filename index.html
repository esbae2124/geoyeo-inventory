<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>거여동성당 비품관리 시스템</title>
  <style>
    :root {
      --primary: #6c5ce7;
      --primary-light: #eeeeff;
      --bg: #f8f9fa;
      --border: #e0e0e0;
      --text: #2d3436;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 10px; }
    
    /* 상단 헤더 영역 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 12px 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      margin-bottom: 12px;
    }
    .logo-zone { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 1.1rem; }
    
    /* 🌟 우측 상단 버튼 및 상태 표시창 통합 박스 */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    /* 상태 표시창 고정 스타일 (절대 아래 레이아웃을 흔들지 않음) */
    #save-status {
      font-size: 0.8rem;
      font-weight: bold;
      color: #666;
      background: #f1f2f6;
      padding: 6px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .btn-lock { background: #ffeaa7; color: #d63031; }
    .btn-unlock { background: #e3faf2; color: #20c997; }
    .btn-excel { background: var(--primary); color: white; }

    /* 탭 및 메뉴 */
    .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tab { padding: 8px 16px; background: white; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-weight: bold; }
    .tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    
    .floor-select-zone {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      background: white;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    select { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); font-weight: bold; }

    /* 도면 구역 */
    .canvas-container {
      background: white;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 16px;
      margin-bottom: 12px;
    }
    /* 🌟 도면 위 타이틀바 (이제 순수하게 제목만 남아서 꿀렁이지 않음!) */
    .canvas-title-bar {
      font-size: 0.95rem;
      font-weight: bold;
      margin-bottom: 12px;
      color: #2d3436;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .grid-canvas {
      width: 100%;
      height: 380px;
      background-color: #fafafa;
      background-image: linear-gradient(rgba(108,92,231,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(108,92,231,0.04) 1px, transparent 1px);
      background-size: 20px 20px;
      position: relative;
      border-radius: 8px;
      border: 1px solid #e8e8e8;
      overflow: hidden;
    }

    .room {
      position: absolute;
      background: rgba(108, 92, 231, 0.08);
      border: 2px solid var(--primary);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 0.75rem;
      font-weight: bold;
      color: #4834d4;
      text-align: center;
      padding: 4px;
      cursor: move;
      user-select: none;
    }
    .room.selected { background: rgba(108, 92, 231, 0.2); box-shadow: 0 0 0 2px #4834d4 inset; }
    .room-count { font-size: 11px; color: #6c5ce7; font-weight: normal; margin-top: 2px; background: white; padding: 1px 5px; border-radius: 10px; border: 1px solid rgba(108,92,231,0.3); }

    /* 리사이즈 핸들 (PC용) */
    .resize-handle { position: absolute; width: 10px; height: 10px; background: var(--primary); right: -2px; bottom: -2px; cursor: se-resize; border-radius: 50%; }

    /* 상세 패널 및 리스트 */
    .detail-panel { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 16px; }
    .panel-title { font-size: 1rem; font-weight: bold; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--bg); padding-bottom: 8px; }
    
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.8rem; color: #666; margin-bottom: 4px; font-weight: bold; }
    .form-group input, .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: #f5f6fa; font-size: 0.9rem; }
    
    .item-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
    .item-table th, .item-table td { padding: 8px; border-bottom: 1px solid var(--border); text-align: left; }
    .item-table th { background: #f1f2f6; font-weight: bold; }
    
    .btn-del { background: none; border: none; cursor: pointer; font-size: 1rem; color: #ff7675; }
    .photo-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .photo-item { position: relative; width: 70px; height: 70px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; }
    .photo-item .btn-img-del { position: absolute; top: 0; right: 0; background: rgba(0,0,0,0.6); color: white; border: none; width: 18px; height: 18px; font-size: 10px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo-zone">🏢 비품 관리 <span style="font-size:0.8rem; color:#aaa; font-weight:normal;">Building Inventory</span></div>
    <div class="header-actions">
      <span id="save-status">👀 조회 모드</span>
      <button id="lock-btn" class="btn btn-lock" onclick="toggleLockMode()">🔒 편집 잠금</button>
      <button id="excel-btn" class="btn btn-excel">📥 엑셀</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="alert('층별 도면 모드입니다.')">🗺️ 층별 도면</div>
    <div class="tab" onclick="alert('준비 중인 기능입니다.')">📋 전체 목록</div>
  </div>

  <div class="floor-select-zone">
    <select id="floor-select" onchange="switchFloor(this.value)">
      <option value="B1">🅱️ 지하 1층</option>
      <option value="F0">🌿 마당</option>
      <option value="F1">1️⃣ 지상 1층</option>
      <option value="F2">2️⃣ 지상 2층</option>
      <option value="F3">3️⃣ 지상 3층</option>
    </select>
    <button class="btn" style="background:#f1f2f6;" onclick="addRoom()">➕ 공간 추가</button>
    <button class="btn" style="background:#fff0f0; color:#ff7675;" onclick="deleteRoom()">🗑️ 공간 삭제</button>
  </div>

  <div class="canvas-container">
    <div class="canvas-title-bar">
      📍 <span id="canvas-floor-title">지하 1층</span> 
      <span id="canvas-mode-guide" style="font-size:0.75rem; color:#888; font-weight:normal;">— 🔒 조회 모드입니다. (수정하려면 잠금을 해제하세요)</span>
    </div>
    <div id="grid-canvas" class="grid-canvas"></div>
  </div>

  <div id="detail-panel" class="detail-panel" style="display:none;">
    </div>

  <script>
    // 🔐 비밀번호 설정 규칙
    const ADMIN_PASSWORD = "2580"; 
    let isLockedMode = true; // 기본값은 안전하게 잠금(조회) 모드

    // 임시 샘플 데이터 구조 (구글 시트 A1 셀과 연동되는 양식)
    let currentFloor = "B1";
    let selectedRoom = null;
    let data = {
      "B1": [
        { id: 1, name: "대건 안드레아", x: 280, y: 20, w: 100, h: 340, items: [], photos: [] },
        { id: 2, name: "주방", x: 200, y: 20, w: 70, h: 140, items: [], photos: [] },
        { id: 3, name: "창고", x: 200, y: 270, w: 50, h: 90, items: [], photos: [] }
      ],
      "F0": [], "F1": [], "F2": [], "F3": []
    };

    // 초기 구동 및 화면 렌더링
    window.onload = function() {
      renderFloor();
      updateLockUI();
    };

    function renderFloor() {
      const canvas = document.getElementById('grid-canvas');
      canvas.innerHTML = '';
      const rooms = data[currentFloor] || [];
      
      rooms.forEach(r => {
        const div = document.createElement('div');
        div.className = `room ${selectedRoom && selectedRoom.id === r.id ? 'selected' : ''}`;
        div.style.left = r.x + 'px';
        div.style.top = r.y + 'px';
        div.style.width = r.w + 'px';
        div.style.height = r.h + 'px';
        
        // 방 이름 및 비품 개수 배지
        div.innerHTML = `<div>${r.name}</div>`;
        if(r.items && r.items.length > 0) {
          div.innerHTML += `<div class="room-count">${r.items.length}개</div>`;
        }

        // PC용 리사이즈 핸들 매립 (편집 중일 때만 등장)
        if(!isLockedMode) {
          const handle = document.createElement('div');
          handle.className = 'resize-handle';
          handle.addEventListener('mousedown', (e) => initResize(e, r));
          div.appendChild(handle);
          
          // 마우스 드래그 이동 이벤트 리스너 등록
          div.addEventListener('mousedown', (e) => initDrag(e, r));
        }

        // 공간 클릭시 상세 패널 열기
        div.addEventListener('click', (e) => {
          if(e.target.className === 'resize-handle') return;
          selectRoom(r);
        });

        canvas.appendChild(div);
      });
      
      document.getElementById('canvas-floor-title').innerText = document.getElementById('floor-select').options[document.getElementById('floor-select').selectedIndex].text;
    }

    // 🔒 🔓 잠금 및 편집 모드 전환 시스템
    function toggleLockMode() {
      if (isLockedMode) {
        // 잠금 해제 시도 시 비밀번호 검증
        const pw = prompt("🔑 관리자 편집 비밀번호를 입력하세요:");
        if (pw === ADMIN_PASSWORD) {
          isLockedMode = false;
          alert("🔓 잠금이 해제되었습니다. 자유롭게 드래그 및 수정이 가능합니다.");
        } else if (pw !== null) {
          alert("❌ 비밀번호가 틀렸습니다!");
        }
      } else {
        // 잠금 활성화
        isLockedMode = true;
        alert("🔒 편집 창고가 잠겼습니다. 안전 모드(조회만 가능)로 전환합니다.");
      }
      updateLockUI();
      renderFloor();
    }

    function updateLockUI() {
      const btn = document.getElementById('lock-btn');
      const statusText = document.getElementById('save-status');
      const guideText = document.getElementById('canvas-mode-guide');

      if (isLockedMode) {
        btn.innerText = "🔒 편집 잠금";
        btn.className = "btn btn-lock";
        statusText.innerText = "👀 조회 모드";
        statusText.style.background = "#f1f2f6";
        guideText.innerText = "— 🔒 현재 조회 모드입니다. (수정하려면 잠금을 해제하세요)";
      } else {
        btn.innerText = "🔓 편집 중...";
        btn.className = "btn btn-unlock";
        statusText.innerText = "🛠️ 편집 모드";
        statusText.style.background = "#e3faf2";
        guideText.innerText = "— 🛠️ 드래그하여 배치 수정 가능 (Ctrl+드래그시 복사)";
      }
    }

    function switchFloor(val) {
      currentFloor = val;
      selectedRoom = null;
      document.getElementById('detail-panel').style.display = 'none';
      renderFloor();
    }

    // 📷 사진 삭제 규칙 (🛡️ 실수 방지 안전 자물쇠 매립)
    function removeRoomPhoto(id, idx) {
      if(isLockedMode) return;
      
      if (!confirm("📷 이 공간 사진을 정말로 삭제하시겠습니까?")) {
        return; // 취소 누르면 동작 중단
      }

      const r = (data[currentFloor] || []).find(r => r.id === id);
      if(r && r.photos){
        r.photos.splice(idx, 1);
        if(selectedRoom && selectedRoom.id === id) selectedRoom.photos = r.photos;
        saveData(); 
        // 패널 리렌더링 함수 연동 (생략 처리 대체)
      }
    }

    // 🗑️ 비품 삭제 규칙 (🛡️ 실수 방지 안전 자물쇠 매립)
    function removeItem(rid, idx){
      if(isLockedMode) return;
      const r = (data[currentFloor] || []).find(r => r.id === rid);
      if(!r) return;

      if (!confirm("🗑️ 이 비품 항목을 정말로 삭제하시겠습니까?")) {
        return; // 취소 누르면 동작 중단
      }

      r.items.splice(idx, 1);
      if(selectedRoom && selectedRoom.id === rid) selectedRoom = r;
      saveData(); 
      renderFloor();
      // 상세 테이블 목록 갱신 구문 연동 영역
    }

    // 임시 시뮬레이션용 데이터 저장소 통신 함수
    function saveData() {
      const statusText = document.getElementById('save-status');
      statusText.innerText = "🔄 저장 중...";
      statusText.style.background = "#fff9db";

      setTimeout(() => {
        statusText.innerText = "✅ 자동저장";
        statusText.style.background = "#e3faf2";
      }, 800);
    }

    // 드래그 및 리사이즈 스켈레톤 함수 정의 (기능 작동용 최소화 구조)
    function initDrag(e, r) { /* 드래그 구현부 */ }
    function initResize(e, r) { /* 리사이즈 구현부 */ }
    function selectRoom(r) { selectedRoom = r; renderFloor(); document.getElementById('detail-panel').style.display = 'block'; }
    function addRoom() { if(isLockedMode) return; /* 추가 로직 */ saveData(); }
    function deleteRoom() { if(isLockedMode) return; /* 삭제 로직 */ saveData(); }
  </script>
</body>
</html>
